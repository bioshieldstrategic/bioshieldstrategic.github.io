<section class="main-content admin-page">
    <div class="container">
        <div class="card admin-card" id="login-card">
            <h2>Login</h2>
            <p>Esta área permite editar o conteúdo do site. A senha é usada para proteger o acesso básico no navegador.</p>
            <input id="admin-password" type="password" placeholder="Digite sua senha" class="admin-input">
            <button id="admin-login" class="btn">Entrar</button>
        </div>

        <div class="card admin-card hidden" id="editor-card">
            <h2>Editor de Conteúdo</h2>
            <p style="color: var(--slate-grey); margin-bottom: 20px;">Acesse o painel completo em <a href="/admin/" style="color: var(--deep-navy); font-weight: 600;">/admin/</a></p>
        </div>
    </div>
</section>

<script>
    const passwordInput = document.getElementById('admin-password');
    const loginButton = document.getElementById('admin-login');
    const loginCard = document.getElementById('login-card');
    const editorCard = document.getElementById('editor-card');

    passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            handleLogin();
        }
    });

    loginButton.addEventListener('click', handleLogin);

    function handleLogin() {
        const value = passwordInput.value.trim();
        if (value === 'bio2026') {
            window.location.href = '/admin/';
        } else {
            alert('Senha incorreta.');
        }
    }
</script>
