<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - BioShield Strategic</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .admin-section { padding: 40px 0; }
        .hidden { display: none; }
        .btn-save { background: #28a745; margin-top: 20px; }
        .btn-add { background: var(--deep-navy); margin-bottom: 20px; }
        .btn-delete { background: var(--security-red); padding: 8px 16px; margin-top: 10px; }
        input, textarea { margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; border-radius: 4px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body style="background: #f0f2f5;">

    <div id="login-area" class="admin-login container">
        <div class="card" style="margin-top: 100px;">
            <h2>Área Administrativa</h2>
            <p style="color: var(--slate-grey); margin-bottom: 20px;">Acesse com sua senha para editar o conteúdo do site.</p>
            <form id="login-form">
                <input type="password" id="admin-pass" placeholder="Senha de Acesso" required>
                <button type="submit" class="btn">Entrar</button>
            </form>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden">
        <header class="header">
            <div class="container">
                <a href="/" class="brand">BioShield Strategic</a>
                <nav style="display: flex; gap: 20px; align-items: center;">
                    <span style="color: var(--slate-grey); font-size: 14px;">Modo Admin</span>
                    <a href="/" class="btn" style="padding: 8px 16px; font-size: 14px;">Ver Site</a>
                    <button onclick="logout()" class="btn btn-secondary" style="padding: 8px 16px; font-size: 14px;">Sair</button>
                </nav>
            </div>
        </header>

        <div class="container admin-container">
            <div class="tabs-nav">
                <div class="tab-link active" onclick="showTab('site-config')">Site Settings</div>
                <div class="tab-link" onclick="showTab('articles-manager')">Gerenciar Artigos</div>
            </div>

            <div id="site-config" class="tab-content active">
                <h3>Configurações Globais - Hero &amp; Sobre</h3>
                <div class="form-group">
                    <label>Título Hero (PT)</label>
                    <input type="text" id="site-hero-title-pt">
                </div>
                <div class="form-group">
                    <label>Subtítulo Hero (PT)</label>
                    <textarea id="site-hero-subtitle-pt" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Título Hero (EN)</label>
                    <input type="text" id="site-hero-title-en">
                </div>
                <div class="form-group">
                    <label>Subtitle Hero (EN)</label>
                    <textarea id="site-hero-subtitle-en" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Telefone Contato (PT)</label>
                    <input type="text" id="site-contact-phone-pt">
                </div>
                <div class="form-group">
                    <label>Telefone Contato (EN)</label>
                    <input type="text" id="site-contact-phone-en">
                </div>
            </div>

            <div id="articles-manager" class="tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>Artigos do Site (PT / EN)</h3>
                    <button class="btn btn-add" onclick="addNewArticle()">+ Adicionar Novo Artigo</button>
                </div>
                <div id="articles-list"></div>
            </div>

            <hr style="margin: 40px 0;">
            <button class="btn btn-save" id="save-btn">Salvar Alterações no GitHub</button>
            <p id="status-msg" style="margin-top: 15px; font-weight: 700;"></p>
        </div>
    </div>

    <script>
        let currentData = null;
        const REPO_OWNER = 'bioshieldstrategic';
        const REPO_NAME = 'bioshieldstrategic.github.io';
        const FILE_PATH = 'data/content.json';

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const pass = document.getElementById('admin-pass').value;
            if (pass === 'bio2026') {
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadCurrentContent();
            } else {
                alert("Senha incorreta.");
            }
        });

        document.getElementById('admin-pass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('login-form').dispatchEvent(new Event('submit'));
            }
        });

        function logout() {
            location.reload();
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        async function loadCurrentContent() {
            try {
                const response = await fetch('/data/content.json');
                currentData = await response.json();
                
                document.getElementById('site-hero-title-pt').value = currentData.pt.site.hero.title || '';
                document.getElementById('site-hero-subtitle-pt').value = currentData.pt.site.hero.subtitle || '';
                document.getElementById('site-hero-title-en').value = currentData.en.site.hero.title || '';
                document.getElementById('site-hero-subtitle-en').value = currentData.en.site.hero.subtitle || '';
                document.getElementById('site-contact-phone-pt').value = currentData.pt.site.contact.phone || '';
                document.getElementById('site-contact-phone-en').value = currentData.en.site.contact.phone || '';

                renderArticles();
            } catch (err) {
                console.error("Erro ao carregar conteúdo:", err);
            }
        }

        function renderArticles() {
            const list = document.getElementById('articles-list');
            list.innerHTML = currentData.pt.articles.map((art, index) => {
                const enArt = currentData.en.articles[index] || {};
                return `
                <div class="article-edit-card">
                    <h4 style="color: var(--deep-navy); margin-bottom: 15px;">Artigo ${art.id}</h4>
                    <p style="font-size: 12px; color: var(--slate-grey); font-weight: 700;">PORTUGUÊS</p>
                    <label>Título</label>
                    <input type="text" value="${art.title}" onchange="updateArticle(${index}, 'pt', 'title', this.value)">
                    <label>Resumo</label>
                    <input type="text" value="${art.summary}" onchange="updateArticle(${index}, 'pt', 'summary', this.value)">
                    <label>Conteúdo (HTML)</label>
                    <textarea rows="5" onchange="updateArticle(${index}, 'pt', 'content', this.value)">${art.content}</textarea>
                    
                    <p style="font-size: 12px; color: var(--slate-grey); font-weight: 700; margin-top: 20px;">ENGLISH</p>
                    <label>Title</label>
                    <input type="text" value="${enArt.title || ''}" onchange="updateArticle(${index}, 'en', 'title', this.value)">
                    <label>Summary</label>
                    <input type="text" value="${enArt.summary || ''}" onchange="updateArticle(${index}, 'en', 'summary', this.value)">
                    <label>Content (HTML)</label>
                    <textarea rows="5" onchange="updateArticle(${index}, 'en', 'content', this.value)">${enArt.content || ''}</textarea>
                </div>
            `}).join('');
        }

        function updateArticle(index, lang, field, value) {
            currentData[lang].articles[index][field] = value;
        }

        function addNewArticle() {
            const newId = (parseInt(currentData.pt.articles[currentData.pt.articles.length - 1]?.id || 0) + 1).toString();
            const newArt = {
                id: newId,
                title: "Novo Artigo",
                summary: "Resumo do artigo...",
                content: "<h3>Conteúdo</h3><p>Texto aqui...</p>"
            };
            const newArtEn = {
                id: newId,
                title: "New Article",
                summary: "Article summary...",
                content: "<h3>Content</h3><p>Text here...</p>"
            };
            currentData.pt.articles.push(newArt);
            currentData.en.articles.push(newArtEn);
            renderArticles();
        }

        document.getElementById('save-btn').addEventListener('click', async () => {
            const token = prompt("Insira seu GitHub Personal Access Token (PAT) para autorizar o deploy:");
            if (!token) return;

            const status = document.getElementById('status-msg');
            status.innerText = "Preparando commit...";
            status.style.color = "#002147";

            try {
                currentData.pt.site.hero.title = document.getElementById('site-hero-title-pt').value;
                currentData.pt.site.hero.subtitle = document.getElementById('site-hero-subtitle-pt').value;
                currentData.en.site.hero.title = document.getElementById('site-hero-title-en').value;
                currentData.en.site.hero.subtitle = document.getElementById('site-hero-subtitle-en').value;
                currentData.pt.site.contact.phone = document.getElementById('site-contact-phone-pt').value;
                currentData.en.site.contact.phone = document.getElementById('site-contact-phone-en').value;

                const getFile = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const fileData = await getFile.json();
                const sha = fileData.sha;

                const updatedContent = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
                
                const putFile = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Atualização de conteúdo via Admin Panel - " + new Date().toISOString(),
                        content: updatedContent,
                        sha: sha
                    })
                });

                if (putFile.ok) {
                    status.innerText = "Sucesso! O site será atualizado em instantes no GitHub Pages.";
                    status.style.color = "#22c55e";
                } else {
                    const err = await putFile.json();
                    status.innerText = "Erro no Deploy: " + err.message;
                    status.style.color = "#9b1c1c";
                }
            } catch (err) {
                status.innerText = "Erro técnico: " + err.message;
                status.style.color = "#9b1c1c";
            }
        });
    </script>
</body>
</html>
