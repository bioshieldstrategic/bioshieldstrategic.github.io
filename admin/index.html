<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - BioShield Strategic</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .admin-section { padding: 40px 0; }
        .hidden { display: none; }
        .btn-save { background: #28a745; margin-top: 20px; }
        .btn-add { background: var(--deep-navy); margin-bottom: 20px; }
        .btn-delete { background: var(--security-red); padding: 8px 16px; margin-top: 10px; }
        input, textarea { margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body style="background: #f0f2f5;">

    <!-- Login Context -->
    <div id="login-area" class="admin-login container">
        <div class="card" style="margin-top: 100px;">
            <h2>Área Administrativa</h2>
            <form id="login-form">
                <input type="password" id="admin-pass" placeholder="Senha de Acesso" required>
                <button type="submit" class="btn">Entrar</button>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="hidden">
        <header class="header">
            <div class="container">
                <span class="brand">Admin Panel</span>
                <button onclick="logout()" class="btn" style="padding: 8px 16px;">Sair</button>
            </div>
        </header>

        <div class="container admin-container">
            <div class="tabs-nav">
                <div class="tab-link active" onclick="showTab('site-config')">Site Settings</div>
                <div class="tab-link" onclick="showTab('articles-manager')">Gerenciar Artigos</div>
            </div>

            <!-- Tab 1: Site Config -->
            <div id="site-config" class="tab-content active">
                <h3>Configurações Globais (Hero & Sobre)</h3>
                <div class="form-group">
                    <label>Título Hero</label>
                    <input type="text" id="site-hero-title">
                </div>
                <div class="form-group">
                    <label>Subtítulo Hero</label>
                    <textarea id="site-hero-subtitle" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Telefone Contato</label>
                    <input type="text" id="site-contact-phone">
                </div>
            </div>

            <!-- Tab 2: Articles Manager -->
            <div id="articles-manager" class="tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>Artigos do Site</h3>
                    <button class="btn btn-add" onclick="addNewArticle()">+ Adicionar Novo Artigo</button>
                </div>
                <div id="articles-list">
                    <!-- Cards de edição populados via JS -->
                </div>
            </div>

            <hr style="margin: 40px 0;">
            <button class="btn btn-save" id="save-btn">Salvar Alterações no GitHub</button>
            <p id="status-msg" style="margin-top: 15px; font-weight: 700;"></p>
        </div>
    </div>

    <script>
        let currentData = null;
        const REPO_OWNER = 'bioshieldstrategic';
        const REPO_NAME = 'bioshieldstrategic.github.io';
        const FILE_PATH = 'data/content.json';

        // Fake Login logic (requested as a form with Enter listener)
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const pass = document.getElementById('admin-pass').value;
            if (pass === 'admin2026') { // Senha exemplo
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadCurrentContent();
            } else {
                alert("Senha incorreta.");
            }
        });

        function logout() {
            location.reload();
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        async function loadCurrentContent() {
            try {
                const response = await fetch('/data/content.json');
                currentData = await response.json();
                
                // Populate Site Config
                document.getElementById('site-hero-title').value = currentData.site.hero.title;
                document.getElementById('site-hero-subtitle').value = currentData.site.hero.subtitle;
                document.getElementById('site-contact-phone').value = currentData.site.contact.phone;

                renderArticles();
            } catch (err) {
                console.error("Erro ao carregar conteúdo:", err);
            }
        }

        function renderArticles() {
            const list = document.getElementById('articles-list');
            list.innerHTML = currentData.articles.map((art, index) => `
                <div class="article-edit-card">
                    <label>Título do Artigo</label>
                    <input type="text" value="${art.title}" onchange="updateArticle(${index}, 'title', this.value)">
                    <label>Resumo</label>
                    <textarea onchange="updateArticle(${index}, 'summary', this.value)">${art.summary}</textarea>
                    <label>Conteúdo Completo (HTML permitido)</label>
                    <textarea rows="6" onchange="updateArticle(${index}, 'content', this.value)">${art.content}</textarea>
                    <button class="btn btn-delete" onclick="deleteArticle(${index})">Excluir Artigo</button>
                </div>
            `).join('');
        }

        function updateArticle(index, field, value) {
            currentData.articles[index][field] = value;
        }

        function addNewArticle() {
            const newArt = {
                id: Date.now().toString(),
                title: "Novo Artigo",
                summary: "Resumo do artigo...",
                content: "<h3>Conteúdo</h3><p>Texto aqui...</p>"
            };
            currentData.articles.unshift(newArt);
            renderArticles();
        }

        function deleteArticle(index) {
            if (confirm("Deseja excluir este artigo?")) {
                currentData.articles.splice(index, 1);
                renderArticles();
            }
        }

        // GitHub Integration
        document.getElementById('save-btn').addEventListener('click', async () => {
            const token = prompt("Insira seu GitHub Personal Access Token (PAT) para autorizar o deploy:");
            if (!token) return;

            const status = document.getElementById('status-msg');
            status.innerText = "Preparando commit...";
            status.style.color = "blue";

            try {
                // Update specific site fields before saving
                currentData.site.hero.title = document.getElementById('site-hero-title').value;
                currentData.site.hero.subtitle = document.getElementById('site-hero-subtitle').value;
                currentData.site.contact.phone = document.getElementById('site-contact-phone').value;

                // 1. Get current file SHA
                const getFile = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const fileData = await getFile.json();
                const sha = fileData.sha;

                // 2. Push Update
                const updatedContent = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
                
                const putFile = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Atualização de conteúdo via Admin",
                        content: updatedContent,
                        sha: sha
                    })
                });

                if (putFile.ok) {
                    status.innerText = "Sucesso! O site será atualizado em instantes no GitHub Pages.";
                    status.style.color = "green";
                } else {
                    const err = await putFile.json();
                    status.innerText = "Erro no Deploy: " + err.message;
                    status.style.color = "red";
                }
            } catch (err) {
                status.innerText = "Erro técnico: " + err.message;
                status.style.color = "red";
            }
        });
    </script>
</body>
</html>
