<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioShield Strategic - Estratégias em Controle de Zoonoses</title>
    <meta name="description" content="Especialistas em Controle de Zoonoses e Saúde Pública (One Health).">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    
    <div id="loader-container">
        <svg class="dna-loader" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path class="dna-path" d="M30,20 Q50,50 30,80" />
            <path class="dna-path" d="M70,20 Q50,50 70,80" />
            <line class="dna-path" x1="35" y1="30" x2="65" y2="30" />
            <line class="dna-path" x1="45" y1="50" x2="55" y2="50" />
            <line class="dna-path" x1="35" y1="70" x2="65" y2="70" />
        </svg>
    </div>

    <header class="header">
        <div class="container">
            <a href="/" class="brand">BioShield Strategic</a>
            <nav class="nav-menu">
                <a href="/#home" data-i18n="nav.home">Home</a>
                <a href="/#sobre" data-i18n="nav.about">Sobre</a>
                <a href="/#artigos" data-i18n="nav.articles">Artigos</a>
                <a href="/#contato" data-i18n="nav.contact">Contato</a>
                <a href="/admin/" style="opacity: 0.6; font-size: 13px;" data-i18n="nav.admin">Admin</a>
                <button class="lang-switch" id="lang-switch" onclick="toggleLanguage()">PT | EN</button>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <div id="article-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modal-body-content"></div>
        </div>
    </div>

    <script>
        let currentLang = localStorage.getItem('bioshield_lang') || 'pt';
        let siteContent = {};

        window.addEventListener('load', () => {
            const loader = document.getElementById('loader-container');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 800);
        });

        async function loadSiteContent() {
            try {
                const response = await fetch('/data/content.json');
                siteContent = await response.json();
                applyLanguage(currentLang);
            } catch (err) {
                console.error("Erro ao carregar conteúdo:", err);
            }
        }

        function applyLanguage(lang) {
            const content = siteContent[lang];
            if (!content) return;

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                const value = getNestedValue(content, key);
                if (value) el.textContent = value;
            });

            const langSwitch = document.getElementById('lang-switch');
            if (langSwitch) {
                langSwitch.textContent = lang === 'pt' ? 'PT | EN' : 'EN | PT';
            }

            document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en-US';
            
            updateDynamicContent(content);
            
            loadArticlesGrid();
        }

        function getNestedValue(obj, path) {
            return path.split('.').reduce((acc, part) => acc && acc[part], obj);
        }

        function updateDynamicContent(content) {
            const heroTitle = document.getElementById('hero-title');
            const heroSubtitle = document.getElementById('hero-subtitle');
            const heroBtn = document.getElementById('hero-btn');
            const aboutTitle = document.getElementById('about-title');
            const aboutText1 = document.getElementById('about-text-1');
            const aboutText2 = document.getElementById('about-text-2');
            const standardsTitle = document.getElementById('standards-title');
            const standardsSubtitle = document.getElementById('standards-subtitle');
            const contactTitle = document.getElementById('contact-title');
            const contactText = document.getElementById('contact-text');
            const contactPhone = document.getElementById('contact-phone');
            const contactEmail = document.getElementById('contact-email');

            if (heroTitle) heroTitle.textContent = content.site.hero.title;
            if (heroSubtitle) heroSubtitle.textContent = content.site.hero.subtitle;
            if (heroBtn) heroBtn.textContent = content.site.hero.buttonText;
            if (aboutTitle) aboutTitle.textContent = content.site.about.title;
            if (aboutText1) aboutText1.innerHTML = content.site.about.content1;
            if (aboutText2) aboutText2.innerHTML = content.site.about.content2;
            if (standardsTitle) standardsTitle.textContent = content.site.standards.title;
            if (standardsSubtitle) standardsSubtitle.innerHTML = content.site.standards.subtitle;
            if (contactTitle) contactTitle.textContent = content.site.contact.title;
            if (contactText) contactText.textContent = content.site.contact.text;
            if (contactPhone) contactPhone.textContent = content.site.contact.phone;
            if (contactEmail) contactEmail.textContent = content.site.contact.email;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'pt' ? 'en' : 'pt';
            localStorage.setItem('bioshield_lang', currentLang);
            applyLanguage(currentLang);
        }

        async function loadArticlesGrid() {
            const grid = document.getElementById('articles-grid');
            if (!grid) return;

            const content = siteContent[currentLang];
            if (!content || !content.articles) return;

            grid.innerHTML = content.articles.map(article => `
                <div class="card" onclick="openArticle('${article.id}')">
                    <h2>${article.title}</h2>
                    <p>${article.summary}</p>
                    <span style="color: var(--deep-navy); font-weight: 700; font-size: 14px;">${currentLang === 'pt' ? 'Ler Artigo Completo' : 'Read Full Article'} &rarr;</span>
                </div>
            `).join('');
        }

        function openArticle(id) {
            const content = siteContent[currentLang];
            if (!content || !content.articles) return;

            const article = content.articles.find(a => a.id == id);
            if (!article) return;

            const modal = document.getElementById('article-modal');
            const modalBody = document.getElementById('modal-body-content');

            modalBody.innerHTML = `
                <h1 style="color: var(--deep-navy); font-size: 32px; margin-bottom: 10px;">${article.title}</h1>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                <div class="article-rich-text">${article.content}</div>
            `;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('article-modal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onclick = (event) => {
            const modal = document.getElementById('article-modal');
            if (event.target === modal) {
                closeModal();
            }
        }

        window.toggleLanguage = toggleLanguage;
        window.openArticle = openArticle;
        window.closeModal = closeModal;

        loadSiteContent();
    </script>

</body>
</html>
