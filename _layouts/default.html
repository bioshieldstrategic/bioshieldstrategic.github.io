<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "BioShield Strategic" }}</title>
    <meta name="description" content="Especialistas em Controle de Zoonoses e Saúde Pública (One Health).">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    
    <div id="loader-container">
        <div class="dna-loader">
            <svg class="dna-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <path class="helix-path1" d="M 30 12 C 38 30, 38 90, 30 108" />
                <path class="helix-path2" d="M 90 12 C 82 30, 82 90, 90 108" />
                <line class="helix-rung" x1="32" y1="25" x2="88" y2="25" />
                <line class="helix-rung" x1="36" y1="42" x2="84" y2="42" />
                <line class="helix-rung" x1="42" y1="60" x2="78" y2="60" />
                <line class="helix-rung" x1="36" y1="78" x2="84" y2="78" />
                <line class="helix-rung" x1="32" y1="95" x2="88" y2="95" />
            </svg>
            <div class="loader-text">INICIALIZANDO</div>
        </div>
    </div>

    <header class="header">
        <div class="container">
            <a href="/" class="brand">BioShield Strategic</a>
            <nav class="nav-menu">
                <a href="/#home">Home</a>
                <a href="/#sobre">Sobre</a>
                <a href="/#artigos">Artigos</a>
                <a href="/#contato">Contato</a>
                <a href="{{ '/admin.html' | relative_url }}">Admin</a>
                <button class="lang-switch">PT | EN</button>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <div id="article-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="modal-body-content"></div>
        </div>
    </div>

    <script>
        // Oculta o loader suavemente após o carregamento
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader-container');
            if (loader) {
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }, 1000);
            }
        });

        // Lógica do Modal de Artigos
        const modal = document.getElementById('article-modal');
        const modalBody = document.getElementById('modal-body-content');
        const closeBtn = document.querySelector('.modal-close');

        async function openArticle(id) {
            try {
                const response = await fetch('/data/content.json');
                const data = await response.json();
                const article = data.articles.find(a => a.id == id);
                if (article) {
                    modalBody.innerHTML = `
                        <h1>${article.title}</h1>
                        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                        <div class="article-rich-text">${article.content}</div>
                    `;
                    modal.style.display = 'flex';
                    document.body.style.overflow = 'hidden';
                }
            } catch (err) {
                console.error("Error loading article:", err);
            }
        }

        if(closeBtn) {
            closeBtn.onclick = () => {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }

        window.onclick = (event) => {
            if (event.target == modal) {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }

        // Carregamento dinâmico do Grid de Artigos na Home
        async function loadArticlesGrid() {
            const grid = document.getElementById('articles-grid');
            if (!grid) return;

            try {
                const response = await fetch('/data/content.json');
                const data = await response.json();
                grid.innerHTML = data.articles.map(article => `
                    <div class="card" onclick="openArticle('${article.id}')">
                        <h2>${article.title}</h2>
                        <p>${article.summary}</p>
                        <span style="color: var(--deep-navy); font-weight: 700; font-size: 14px; margin-top:15px; display:inline-block;">Ler Artigo Completo &rarr;</span>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Error loading grid:", err);
            }
        }

        loadArticlesGrid();
    </script>
    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
</body>
</html>
