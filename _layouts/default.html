<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioShield Strategic - Estratégias em Controle de Zoonoses</title>
    <meta name="description" content="Especialistas em Controle de Zoonoses e Saúde Pública (One Health).">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    
    <!-- Loader DNA Simples -->
    <div id="loader-container">
        <svg class="dna-loader" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path class="dna-path" d="M30,20 Q50,50 30,80" />
            <path class="dna-path" d="M70,20 Q50,50 70,80" />
            <line class="dna-path" x1="35" y1="30" x2="65" y2="30" />
            <line class="dna-path" x1="45" y1="50" x2="55" y2="50" />
            <line class="dna-path" x1="35" y1="70" x2="65" y2="70" />
        </svg>
    </div>

    <!-- Header Navigation -->
    <header class="header">
        <div class="container">
            <a href="/" class="brand">BioShield Strategic</a>
            <nav class="nav-menu">
                <a href="/#home">Home</a>
                <a href="/#sobre">Sobre</a>
                <a href="/#artigos">Artigos</a>
                <a href="/#contato">Contato</a>
                <button class="lang-switch">PT | EN</button>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <!-- Modal for Articles content -->
    <div id="article-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="modal-body-content"></div>
        </div>
    </div>

    <script>
        // Loader removal
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader-container');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 800);
        });

        // Article Modal logic
        const modal = document.getElementById('article-modal');
        const modalBody = document.getElementById('modal-body-content');
        const closeBtn = document.querySelector('.modal-close');

        async function openArticle(id) {
            try {
                const response = await fetch('/data/content.json');
                const data = await response.json();
                const article = data.articles.find(a => a.id == id);
                if (article) {
                    modalBody.innerHTML = `
                        <h1>${article.title}</h1>
                        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                        <div class="article-rich-text">${article.content}</div>
                    `;
                    modal.style.display = 'flex';
                    document.body.style.overflow = 'hidden';
                }
            } catch (err) {
                console.error("Error loading article:", err);
            }
        }

        closeBtn.onclick = () => {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onclick = (event) => {
            if (event.target == modal) {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }

        // Article fetching (for home page cards)
        async function loadArticlesGrid() {
            const grid = document.getElementById('articles-grid');
            if (!grid) return;

            try {
                const response = await fetch('/data/content.json');
                const data = await response.json();
                grid.innerHTML = data.articles.map(article => `
                    <div class="card" onclick="openArticle('${article.id}')">
                        <h2>${article.title}</h2>
                        <p>${article.summary}</p>
                        <span style="color: var(--deep-navy); font-weight: 700; font-size: 14px;">Ler Artigo Completo &rarr;</span>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Error loading grid:", err);
            }
        }

        loadArticlesGrid();
    </script>

</body>
</html>
