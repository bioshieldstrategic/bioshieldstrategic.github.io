<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "BioShield Strategic" }}</title>
    <meta name="description" content="Especialistas em Controle de Zoonoses e Saúde Pública. Estratégias em Biossegurança.">
    <!-- Vincula ao arquivo CSS gerado -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    
    <!-- Tela de Carregamento -->
    <div id="loader-container">
        <div class="dna-loader">
            <svg class="dna-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <path class="helix-path1" d="M 30 12 C 38 30, 38 90, 30 108" />
                <path class="helix-path2" d="M 90 12 C 82 30, 82 90, 90 108" />
                <line class="helix-rung" x1="32" y1="25" x2="88" y2="25" />
                <line class="helix-rung" x1="36" y1="42" x2="84" y2="42" />
                <line class="helix-rung" x1="42" y1="60" x2="78" y2="60" />
                <line class="helix-rung" x1="36" y1="78" x2="84" y2="78" />
                <line class="helix-rung" x1="32" y1="95" x2="88" y2="95" />
            </svg>
            <div class="loader-text">INICIALIZANDO</div>
        </div>
    </div>

    <!-- Cabeçalho (Header) -->
    <header class="header">
        <div class="container">
            <a href="{{ '/' | relative_url }}" class="brand">BioShield Strategic</a>
            <nav class="nav-menu">
                <a href="{{ '/' | relative_url }}">Home</a>
                <a href="#artigos">Artigos</a>
                <a href="#sobre">Sobre</a>
                <a href="#contato">Contato</a>
                <a href="{{ '/admin.html' | relative_url }}">Admin</a>
                <button class="lang-switch">PT | EN</button>
            </nav>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main>
        {{ content }}
    </main>

    <!-- Script de controle do Loader e idioma -->
    <script>
        // Oculta o loader após o carregamento total da página
        window.addEventListener('load', function() {
            setTimeout(function() {
                var loader = document.getElementById('loader-container');
                if (loader) loader.classList.add('loader-hidden');
            }, 1000);
        });

        // Evento fictício para a troca de idioma
        document.querySelector('.lang-switch').addEventListener('click', function() {
            alert('A troca de idiomas será implementada na próxima fase.');
        });
    </script>
    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
</body>
</html>
